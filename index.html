<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>Makacs</title>
<script src="https://cdn.jsdelivr.net/npm/p5@1.9.0/lib/p5.js"></script>
<link href="https://fonts.cdnfonts.com/css/baskerville-etext" rel="stylesheet">
<style>
  body {
    margin:0;
    padding:0;
    height:100vh;
    background-color: #c2c8f6; /* háttér */
    overflow:hidden;
    font-family: 'Baskerville eText', Times, serif;
    display:flex;
    justify-content:center;
    align-items:center;
  }
  h1#makacs {
    font-size:10vw;
    color:#772469;
    margin:0;
    cursor:pointer;
    z-index:1;
    text-align:center;
    position:absolute;
  }
  #menu {
    display:none;
    flex-direction: column;
    align-items: center;
    z-index:1;
  }
  .menu-item {
    font-size:2vw;
    color:#772469;
    text-transform: lowercase;
    margin: 20px 0;
    cursor:pointer;
  }
  canvas {
    position:absolute;
    top:0;
    left:0;
    z-index:0;
  }
</style>
</head>
<body>
  <h1 id="makacs">Makacs</h1>

  <div id="menu">
    <h1 class="menu-item" onclick="alert('About Me clicked!')">about me</h1>
    <h1 class="menu-item" onclick="alert('My Art clicked!')">my art</h1>
    <h1 class="menu-item" onclick="alert('Contact clicked!')">contact</h1>
  </div>

  <script src="makacs.js"></script>
  <script>
    document.getElementById('makacs').addEventListener('click', () => {
      document.getElementById('makacs').style.display = 'none';
      document.getElementById('menu').style.display = 'flex';
    });
  </script>
</body>
</html>
