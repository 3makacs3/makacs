<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>Makacs</title>

<script src="https://cdn.jsdelivr.net/npm/p5@1.9.0/lib/p5.js"></script>
<link href="https://fonts.cdnfonts.com/css/baskerville-etext" rel="stylesheet">

<style>
body {
  margin:0;
  background:#c2c8f6;
  font-family:'Baskerville eText', serif;
  overflow:hidden;
}

canvas {
  position:absolute;
  top:0;
  left:0;
  z-index:1;
  pointer-events:none;
}

h1 {
  color:#772469;
  margin:0;
  position:absolute;
  width:100%;
  text-align:center;
  z-index:2;
}

/* MAKACS */
#makacs {
  top:40%;
  font-size:10vw;
  cursor:pointer;
}
#makacs:hover { transform:scale(1.2); }

/* MENÜ */
#menu {
  display:none;
  top:50%;
  transform:translateY(-50%);
}
.menu-item {
  font-size:3vw;
  margin:20px 0;
  cursor:pointer;
}
.menu-item:hover { transform:scale(1.2); }

/* ART ITEM */
.art-item {
  position:absolute;
  font-size:2vw;
  cursor:pointer;
  animation:pulse 2s infinite;
}
.art-item.aggressive {
  animation:aggressive 1s infinite;
}

@keyframes pulse {
  0%{transform:scale(1);}
  50%{transform:scale(1.1);}
  100%{transform:scale(1);}
}

@keyframes aggressive {
  0%{transform:scale(1);}
  50%{transform:scale(1.4);}
  100%{transform:scale(1);}
}

/* ART PAGE */
.art-page {
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:#c2c8f6;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index:3;
}
</style>
</head>

<body>

<h1 id="makacs">Makacs</h1>

<div id="menu">
  <h1 class="menu-item">about me</h1>
  <h1 class="menu-item" id="myArt">my art</h1>
  <h1 class="menu-item">contact</h1>
</div>

<div id="art-container"></div>

<script>
const makacs = document.getElementById("makacs");
const menu = document.getElementById("menu");
const container = document.getElementById("art-container");

makacs.onclick = () => {
  makacs.style.display = "none";
  menu.style.display = "block";
};

document.getElementById("myArt").onclick = () => {

  container.innerHTML = "";

  const items = [
    "photos",
    "videos",
    "paintings",
    "makacs archive",
    "everythingelseyoushouldcareabout!"
  ];

  let placed = [];

  items.forEach(text => {

    const el = document.createElement("h1");
    el.className = "art-item";
    el.innerText = text;

    container.appendChild(el);

    let x, y, tries = 0;

    while(tries < 40){
      x = Math.random() * (window.innerWidth - 200);
      y = Math.random() * (window.innerHeight - 80);

      let ok = true;

      // menü tiltás (közép sáv)
      if(y > window.innerHeight*0.35 && y < window.innerHeight*0.65){
        ok = false;
      }

      // ne fedjék egymást
      for(let p of placed){
        if(Math.abs(x - p.x) < 120 && Math.abs(y - p.y) < 60){
          ok = false;
        }
      }

      if(ok) break;

      tries++;
    }

    el.style.left = x + "px";
    el.style.top = y + "px";

    placed.push({x,y});

    if(text.includes("everything")){
      el.classList.add("aggressive");
    }

    el.onclick = () => openPage(text);
  });
};

function openPage(title){
  const page = document.createElement("div");
  page.className = "art-page";

  page.innerHTML = `
    <h1>${title}</h1>
    <button onclick="this.parentElement.remove()">vissza</button>
  `;

  document.body.appendChild(page);
}
</script>

<script>
// RAJZOLÁS (p5)
let drawing = false;

function setup(){
  createCanvas(windowWidth, windowHeight);
  background("#c2c8f6");
  stroke("#b46b9f");
  strokeWeight(3);
}

function draw(){
  if(drawing && mouseIsPressed){
    line(mouseX, mouseY, pmouseX, pmouseY);
  }
}

function mousePressed(){ drawing = true; }
function mouseReleased(){ drawing = false; }

function windowResized(){
  resizeCanvas(windowWidth, windowHeight);
}
</script>

</body>
</html>
