<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>Makacs</title>
<script src="https://cdn.jsdelivr.net/npm/p5@1.9.0/lib/p5.js"></script>
<link href="https://fonts.cdnfonts.com/css/baskerville-etext" rel="stylesheet">
<style>
  body {
    margin:0;
    padding:0;
    height:100vh;
    background-color:#c2c8f6;
    font-family: 'Baskerville eText', Times, serif;
    overflow:hidden;
  }

  canvas {
    position:absolute;
    top:0;
    left:0;
    z-index:1;
    pointer-events: none;
  }

  h1#makacs, #menu, .art-item, .art-page {
    z-index:2;
    position:absolute;
    width:100%;
    text-align:center;
    color:#772469;
    margin:0;
    font-family: 'Baskerville eText', Times, serif;
  }

  h1#makacs {
    top:40%;
    font-size:10vw;
    cursor:pointer;
    transition: transform 0.2s ease;
  }
  h1#makacs:hover {
    transform: scale(1.2);
  }

  #menu {
    display:none;
    top:50%;
    transform: translateY(-50%);
  }

  .menu-item {
    font-size:3vw;
    margin:20px 0;
    text-transform: lowercase;
    cursor:pointer;
    transition: transform 0.2s ease;
  }
  .menu-item:hover { transform: scale(1.2); }

  .art-item {
    font-size:2vw;
    text-transform: lowercase;
    cursor:pointer;
    animation: pulse 2s infinite ease-in-out;
    position:absolute;
  }

  .art-item.aggressive {
    animation: aggressivePulse 1s infinite ease-in-out;
  }

  @keyframes pulse {
    0%{transform:scale(1);}
    50%{transform:scale(1.1);}
    100%{transform:scale(1);}
  }

  @keyframes aggressivePulse {
    0%{transform:scale(1);}
    50%{transform:scale(1.4);}
    100%{transform:scale(1);}
  }

  .art-page {
    display:none;
    top:0; left:0;
    width:100%; height:100%;
    background-color:#c2c8f6;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction: column;
  }

  .art-page button {
    margin-top:20px;
    font-size:2vw;
    padding:10px 20px;
    cursor:pointer;
  }
</style>
</head>

<body>

<h1 id="makacs">Makacs</h1>

<div id="menu">
  <h1 class="menu-item">about me</h1>
  <h1 class="menu-item" id="my-art">my art</h1>
  <h1 class="menu-item">contact</h1>
</div>

<div id="art-items-container"></div>

<script>
const makacs = document.getElementById('makacs');
const menu = document.getElementById('menu');
const artContainer = document.getElementById('art-items-container');

makacs.addEventListener('click', () => {
  makacs.style.display = 'none';
  menu.style.display = 'block';
});

document.getElementById('my-art').addEventListener('click', () => {

  artContainer.innerHTML = "";

  const artItems = [
    'photos',
    'videos',
    'paintings',
    'makacs archive',
    'everythingelseyoushouldcareabout!'
  ];

  artItems.forEach((text) => {

    const el = document.createElement('h1');
    el.className = 'art-item';
    el.innerText = text;

    el.style.visibility = "hidden";
    artContainer.appendChild(el);

    const rect = el.getBoundingClientRect();
    const padding = 20;

    let x, y;

    // 🔥 addig generálunk, amíg nem ütközik a menüvel
    do {
      x = Math.random() * (window.innerWidth - rect.width - padding*2) + padding;
      y = Math.random() * (window.innerHeight - rect.height - padding*2) + padding;
    } while (
      y > window.innerHeight * 0.35 && 
      y < window.innerHeight * 0.65
    );

    el.style.left = x + "px";
    el.style.top = y + "px";

    if(text === 'everythingelseyoushouldcareabout!'){
      el.classList.add('aggressive');
    }

    el.style.visibility = "visible";

    el.addEventListener('click', () => showArtPage(text));
  });
});

function showArtPage(title) {
  const page = document.createElement('div');
  page.className = 'art-page';
  page.innerHTML = `<div>${title}</div><button onclick="closeArtPage(this)">Vissza</button>`;
  document.body.appendChild(page);
  page.style.display = 'flex';
}

function closeArtPage(btn) {
  btn.parentElement.remove();
}
</script>

<script>
let isDrawing = false;

function setup() {
  createCanvas(windowWidth, windowHeight);
  background('#c2c8f6');
  stroke('#b46b9f');
  strokeWeight(3);
}

function draw() {
  if(isDrawing && mouseIsPressed){
    line(mouseX, mouseY, pmouseX, pmouseY);
  }
}

function mousePressed() { isDrawing = true; }
function mouseReleased() { isDrawing = false; }

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
}
</script>

</body>
</html>
