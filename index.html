<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>Makacs</title>
<script src="https://cdn.jsdelivr.net/npm/p5@1.9.0/lib/p5.js"></script>
<link href="https://fonts.cdnfonts.com/css/baskerville-etext" rel="stylesheet">
<style>
  body {
    margin:0;
    padding:0;
    height:100vh;
    background-color: #c2c8f6; /* háttér */
    overflow:hidden;
  }
  h1 {
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    font-family: 'Baskerville eText', Times, serif;
    font-size:10vw;
    color:#772469;
    margin:0;
    z-index:1;
    pointer-events: none; /* így a felirat nem blokkolja az egér rajzolást */
  }
  canvas {
    position:absolute;
    top:0;
    left:0;
    z-index:0;
  }
</style>
</head>
<body>
  <h1>Makacs</h1>
  <script src="makacs.js"></script>
</body>
</html>
