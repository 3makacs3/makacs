<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>Makacs</title>
<script src="https://cdn.jsdelivr.net/npm/p5@1.9.0/lib/p5.js"></script>
<link href="https://fonts.cdnfonts.com/css/baskerville-etext" rel="stylesheet">
<style>
body { margin:0; padding:0; height:100vh; background-color:#c2c8f6; font-family: 'Baskerville eText', Times, serif; overflow:hidden; }
canvas { position:absolute; top:0; left:0; z-index:1; pointer-events: none; }
h1#makacs, #menu, .art-page { z-index:2; position:absolute; width:100%; text-align:center; color:#772469; margin:0; }
.art-item { position:absolute; z-index:2; color:#772469; margin:0; font-size:2vw; text-transform: lowercase; cursor:pointer; animation: pulse 2s infinite ease-in-out; }
.art-item.aggressive { animation: aggressivePulse 1s infinite ease-in-out; }
@keyframes pulse { 0%{transform:scale(1);} 50%{transform:scale(1.1);} 100%{transform:scale(1);} }
@keyframes aggressivePulse { 0%{transform:scale(1);} 50%{transform:scale(1.4);} 100%{transform:scale(1);} }
h1#makacs { top:40%; font-size:10vw; cursor:pointer; transition: transform 0.2s ease; }
h1#makacs:hover { transform: scale(1.2); }
#menu { display:none; top:50%; transform: translateY(-50%); }
.menu-item { font-size:3vw; margin:20px 0; text-transform: lowercase; cursor:pointer; transition: transform 0.2s ease; }
.menu-item:hover { transform: scale(1.2); }
.floating-back { position:fixed; top:20px; left:30px; font-size:3vw; cursor:pointer; z-index:5; transition: transform 0.2s ease; }
.floating-back:hover { transform: scale(1.2); }
.art-page { display:none; top:0; left:0; width:100%; height:100%; background-color:#c2c8f6; display:flex; justify-content:center; align-items:flex-start; flex-direction: column; overflow-y:auto; padding:50px; box-sizing:border-box; }
.art-page button { margin-top:50px; font-size:2vw; padding:10px 20px; cursor:pointer; }
.media { margin-bottom:60px; }
.media p { margin-top:10px; font-size:1.5vw; }
</style>
</head>
<body>

<h1 id="makacs">Makacs</h1>

<div id="menu">
  <h1 class="menu-item">about me</h1>
  <h1 class="menu-item" id="my-art">my art</h1>
  <h1 class="menu-item">contact</h1>
  <h1 class="menu-item" id="go-back">go back</h1>
</div>

<div id="art-items-container"></div>

<script>
// 🔥 Add your GitHub Pages repo info here
const GITHUB_BASE = "https://username.github.io/makacs/"; // cseréld "username" a GitHub felhasználódra!

const makacs = document.getElementById('makacs');
const menu = document.getElementById('menu');
const artContainer = document.getElementById('art-items-container');

const artContent = {
  'photos': [
    {type:'img', src:GITHUB_BASE + 'kepek/julius22yas.jpg', title:'Zombie with trees-2026'}
  ],
  'videos': [
    {type:'video', src:GITHUB_BASE + 'videos/VLOG.mp4', title:'VLOG-2026'}
  ],
  'paintings': [
    {type:'img', src:GITHUB_BASE + 'kepek/painting1.jpg', title:'Example Painting'}
  ],
  'makacs archive': [],
  'everythingelseyoushouldcareabout!': []
};

// Makacs → Menü
makacs.onclick = () => {
  makacs.style.display = 'none';
  menu.style.display = 'block';
};

// Menü go back
document.getElementById('go-back').onclick = () => {
  menu.style.display = 'none';
  artContainer.innerHTML = "";
  makacs.style.display = 'block';
};

// My Art → random art címek
document.getElementById('my-art').onclick = () => {
  artContainer.innerHTML = "";
  const artItems = Object.keys(artContent);
  artItems.forEach(text => {
    const el = document.createElement('h1');
    el.className = 'art-item';
    el.innerText = text;
    el.style.visibility = "hidden";
    artContainer.appendChild(el);
    const rect = el.getBoundingClientRect();
    const padding = 20;
    let x, y;
    do {
      x = Math.random() * (window.innerWidth - rect.width - padding);
      y = Math.random() * (window.innerHeight - rect.height - padding);
    } while (y > window.innerHeight * 0.35 && y < window.innerHeight * 0.65);
    el.style.left = x + "px";
    el.style.top = y + "px";
    if(text === 'everythingelseyoushouldcareabout!') el.classList.add('aggressive');
    el.style.visibility = "visible";
    el.onclick = () => showArtPage(text);
  });
};

// Art Page
function showArtPage(title) {
  const page = document.createElement('div');
  page.className = 'art-page';
  let content = `<div class="floating-back" onclick="this.closest('.art-page').remove()">← back</div>
    <h1 style="font-size:4vw; text-align:center; margin-bottom:50px;">${title}</h1>`;
  const items = artContent[title];
  if(items && items.length > 0){
    items.forEach(item => {
      if(item.type === "img"){
        content += `<div class="media"><img src="${item.src}" style="width:80%;"><p>${item.title}</p></div>`;
      }
      if(item.type === "video"){
        content += `<div class="media"><video controls style="width:80%;"><source src="${item.src}" type="video/mp4"></video><p>${item.title}</p></div>`;
      }
    });
  } else content += `<p>nincs még tartalom</p>`;
  page.innerHTML = content;
  document.body.appendChild(page);
  page.style.display = 'block';
}
</script>

<script>
let isDrawing = false;
function setup() {
  createCanvas(windowWidth, windowHeight);
  background('#c2c8f6');
  stroke('#b46b9f');
  strokeWeight(3);
}
function draw() {
  if(isDrawing && mouseIsPressed) line(mouseX, mouseY, pmouseX, pmouseY);
}
function mousePressed() { isDrawing = true; }
function mouseReleased() { isDrawing = false; }
function windowResized() { resizeCanvas(windowWidth, windowHeight); }
</script>

</body>
</html>
