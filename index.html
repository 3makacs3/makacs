<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>Makacs</title>
<script src="https://cdn.jsdelivr.net/npm/p5@1.9.0/lib/p5.js"></script>
<link href="https://fonts.cdnfonts.com/css/baskerville-etext" rel="stylesheet">
<style>
  body {
    margin:0;
    padding:0;
    height:100vh;
    background-color:#c2c8f6;
    font-family: 'Baskerville eText', Times, serif;
    overflow:hidden;
  }

  /* Canvas háttér, nem blokkolja az egér eseményeket */
  canvas {
    position:absolute;
    top:0;
    left:0;
    z-index:1;
    pointer-events: none;
  }

  /* Makacs felirat */
  #makacs {
    position:absolute;
    top:40%;
    left:50%;
    transform:translate(-50%, -50%);
    font-size:10vw;
    color:#772469;
    cursor:pointer;
    z-index:2;
    transition: transform 0.2s ease;
    margin:0;
    text-align:center;
  }
  #makacs:hover {
    transform:translate(-50%, -50%) scale(1.2);
  }

  /* Menüpontok */
  #menu {
    display:none;
    flex-direction: column;
    align-items:center;
    position:absolute;
    top:40%;
    left:50%;
    transform:translate(-50%, -50%);
    z-index:2;
  }
  .menu-item {
    font-size:3vw;
    color:#772469;
    margin:20px 0;
    text-transform: lowercase;
    cursor:pointer;
    transition: transform 0.2s ease;
    text-align:center;
  }
  .menu-item:hover {
    transform: scale(1.2);
  }

  /* Art-címek pulzálás */
  @keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.1); }
    100% { transform: scale(1); }
  }
  @keyframes aggressivePulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.4); }
    100% { transform: scale(1); }
  }
  .art-item {
    position:absolute;
    font-size:2vw;
    color:#772469;
    text-transform: lowercase;
    cursor:pointer;
    z-index:2;
    animation: pulse 2s infinite ease-in-out;
  }
  .art-item.aggressive {
    animation: aggressivePulse 1s infinite ease-in-out;
  }
</style>
</head>
<body>

<h1 id="makacs">Makacs</h1>

<div id="menu">
  <h1 class="menu-item" onclick="alert('About Me clicked!')">about me</h1>
  <h1 class="menu-item" id="my-art">my art</h1>
  <h1 class="menu-item" onclick="alert('Contact clicked!')">contact</h1>
</div>

<script>
  // Makacs felirat kattintás → menü
  const makacs = document.getElementById('makacs');
  const menu = document.getElementById('menu');

  makacs.addEventListener('click', () => {
    makacs.style.display = 'none';
    menu.style.display = 'flex';
  });

  // my art → további art-címek
  document.getElementById('my-art').addEventListener('click', () => {
    const artItems = [
      'photos',
      'videos',
      'paintings',
      'makacs archive',
      'everythingelseyoushouldcareabout!' // felkiáltójel
    ];

    artItems.forEach(text => {
      const el = document.createElement('h1');
      el.className = 'art-item';
      el.innerText = text;
      el.style.fontSize = '2vw';
      el.style.left = Math.random() * (window.innerWidth - 200) + 'px';

      // everythinges szöveg feljebb
      if(text === 'everythingelseyoushouldcareabout!') {
        el.style.top = '5%'; // feljebb, a többi art-cím random
        el.classList.add('aggressive');
      } else {
        el.style.top = Math.random() * (window.innerHeight - 100) + 'px';
      }

      document.body.appendChild(el);

      el.onclick = () => alert(text + ' clicked!');
    });
  });
</script>

<script>
  // p5.js canvas a rajzoláshoz
  let isDrawing = false;

  function setup() {
    createCanvas(windowWidth, windowHeight);
    background('#c2c8f6');
    stroke('#b46b9f');
    strokeWeight(3);
  }

  function draw() {
    if (isDrawing && mouseIsPressed) {
      line(mouseX, mouseY, pmouseX, pmouseY);
    }
  }

  function mousePressed() {
    isDrawing = true;
  }

  function mouseReleased() {
    isDrawing = false;
  }

  function windowResized() {
    resizeCanvas(windowWidth, windowHeight);
  }
</script>

</body>
</html>
