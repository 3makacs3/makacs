<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>Makacs</title>
<script src="https://cdn.jsdelivr.net/npm/p5@1.9.0/lib/p5.js"></script>
<link href="https://fonts.cdnfonts.com/css/baskerville-etext" rel="stylesheet">

<style>
body {
  margin:0;
  padding:0;
  height:100vh;
  background-color:#c2c8f6;
  font-family: 'Baskerville eText', Times, serif;
  overflow:hidden;
}

canvas {
  position:absolute;
  top:0;
  left:0;
  z-index:1;
  pointer-events: none;
}

h1#makacs, #menu, .art-page {
  z-index:2;
  position:absolute;
  width:100%;
  text-align:center;
  color:#772469;
  margin:0;
}

.art-item {
  position:absolute;
  z-index:2;
  color:#772469;
  font-size:2vw;
  cursor:pointer;
  animation: pulse 2s infinite ease-in-out;
}

.art-item.aggressive {
  animation: aggressivePulse 1s infinite ease-in-out;
}

@keyframes pulse {
  0%{transform:scale(1);}
  50%{transform:scale(1.1);}
  100%{transform:scale(1);}
}

@keyframes aggressivePulse {
  0%{transform:scale(1);}
  50%{transform:scale(1.4);}
  100%{transform:scale(1);}
}

h1#makacs {
  top:40%;
  font-size:10vw;
  cursor:pointer;
}
h1#makacs:hover { transform: scale(1.2); }

#menu {
  display:none;
  top:50%;
  transform: translateY(-50%);
}

.menu-item {
  font-size:3vw;
  margin:20px 0;
  cursor:pointer;
}
.menu-item:hover { transform: scale(1.2); }

.floating-back {
  position:fixed;
  top:20px;
  left:30px;
  font-size:2vw;
  cursor:pointer;
}

.art-page {
  display:none;
  top:0; left:0;
  width:100%; height:100%;
  background-color:#c2c8f6;
  overflow-y:auto;
  padding:50px;
}

.media {
  margin-bottom:60px;
}
.media img, .media video {
  width:100%;
}
</style>
</head>

<body>

<h1 id="makacs">Makacs</h1>

<div id="menu">
  <h1 class="menu-item">about me</h1>
  <h1 class="menu-item" id="my-art">my art</h1>
  <h1 class="menu-item">contact</h1>
  <h1 class="menu-item" id="go-back">go back</h1>
</div>

<div id="art-items-container"></div>

<script>
const makacs = document.getElementById('makacs');
const menu = document.getElementById('menu');
const artContainer = document.getElementById('art-items-container');

// 🔥 IDE ÍROD A TARTALMAT
const artContent = {
  "photos": [
    {type:"img", src:"kepek/kep1.jpg", title:"első kép"},
    {type:"img", src:"kepek/kep2.jpg", title:"második kép"}
  ],

  "videos": [
    {type:"video", src:"videok/video1.mp4", title:"videó 1"}
  ],

  "paintings": [
    {type:"img", src:"kepek/paint1.jpg", title:"festmény"}
  ],

  "makacs archive": [],
  "everythingelseyoushouldcareabout!": []
};

// Makacs → menü
makacs.onclick = () => {
  makacs.style.display = 'none';
  menu.style.display = 'block';
};

// go back
document.getElementById('go-back').onclick = () => {
  menu.style.display = 'none';
  artContainer.innerHTML = "";
  makacs.style.display = 'block';
};

// art címek
document.getElementById('my-art').onclick = () => {

  artContainer.innerHTML = "";

  Object.keys(artContent).forEach((text) => {

    const el = document.createElement('h1');
    el.className = 'art-item';
    el.innerText = text;

    artContainer.appendChild(el);

    const rect = el.getBoundingClientRect();

    let x, y;

    do {
      x = Math.random() * (window.innerWidth - rect.width);
      y = Math.random() * (window.innerHeight - rect.height);
    } while (
      y > window.innerHeight * 0.35 &&
      y < window.innerHeight * 0.65
    );

    el.style.left = x + "px";
    el.style.top = y + "px";

    if(text === 'everythingelseyoushouldcareabout!'){
      el.classList.add('aggressive');
    }

    el.onclick = () => showArtPage(text);
  });
};

// 🔥 oldal generálás
function showArtPage(title) {

  const page = document.createElement('div');
  page.className = 'art-page';

  let contentHTML = `<div class="floating-back" onclick="this.closest('.art-page').remove()">← back</div>`;
  contentHTML += `<h1 style="font-size:4vw;">${title}</h1>`;

  const items = artContent[title];

  items.forEach(item => {
    if(item.type === "img"){
      contentHTML += `
        <div class="media">
          <img src="${item.src}">
          <p>${item.title}</p>
        </div>
      `;
    }

    if(item.type === "video"){
      contentHTML += `
        <div class="media">
          <video controls>
            <source src="${item.src}" type="video/mp4">
          </video>
          <p>${item.title}</p>
        </div>
      `;
    }
  });

  page.innerHTML = contentHTML;
  document.body.appendChild(page);
  page.style.display = 'block';
}
</script>

<script>
let isDrawing = false;

function setup() {
  createCanvas(windowWidth, windowHeight);
  background('#c2c8f6');
  stroke('#b46b9f');
}

function draw() {
  if(isDrawing && mouseIsPressed){
    line(mouseX, mouseY, pmouseX, pmouseY);
  }
}

function mousePressed() { isDrawing = true; }
function mouseReleased() { isDrawing = false; }

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
}
</script>

</body>
</html>
