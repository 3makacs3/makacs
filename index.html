<script>
const makacs = document.getElementById('makacs');
const menu = document.getElementById('menu');
const artContainer = document.getElementById('art-items-container');

makacs.onclick = ()=>{
  makacs.style.display = "none";
  menu.style.display = "block";
};

document.getElementById('my-art').onclick = ()=>{

  artContainer.innerHTML = "";

  const artItems = [
    'photos',
    'videos',
    'paintings',
    'makacs archive',
    'everythingelseyoushouldcareabout!'
  ];

  let placed = [];

  artItems.forEach(text => {

    const el = document.createElement('h1');
    el.className = 'art-item';
    el.innerText = text;

    artContainer.appendChild(el);

    let x, y;
    let tries = 0;

    do {
      x = Math.random() * (window.innerWidth - 200);
      y = Math.random() * (window.innerHeight - 50);

      let ok = true;

      // 🚫 menü zóna
      if (y > window.innerHeight * 0.35 && y < window.innerHeight * 0.65) {
        ok = false;
      }

      // 🚫 más elemekhez túl közel
      placed.forEach(p => {
        if(Math.abs(x - p.x) < 120 && Math.abs(y - p.y) < 50){
          ok = false;
        }
      });

      if(ok) break;

      tries++;

    } while(tries < 50); // ne akadjon!

    el.style.left = x + "px";
    el.style.top = y + "px";

    placed.push({x, y});

    if(text === 'everythingelseyoushouldcareabout!'){
      el.classList.add('aggressive');
    }

    el.onclick = ()=> showArtPage(text);
  });
};

function showArtPage(title){
  const page = document.createElement('div');
  page.className = 'art-page';
  page.innerHTML = `<div>${title}</div><button onclick="this.parentElement.remove()">vissza</button>`;
  document.body.appendChild(page);
  page.style.display = "flex";
}
</script>
