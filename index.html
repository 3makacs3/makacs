<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>Makacs</title>
<script src="https://cdn.jsdelivr.net/npm/p5@1.9.0/lib/p5.js"></script>
<link href="https://fonts.cdnfonts.com/css/baskerville-etext" rel="stylesheet">
<style>
  body {
    margin:0;
    padding:0;
    height:100vh;
    background-color:#c2c8f6;
    font-family: 'Baskerville eText', Times, serif;
    overflow:hidden;
  }

  canvas {
    position:absolute;
    top:0;
    left:0;
    z-index:1;
    pointer-events: none;
  }

  h1#makacs, .menu-item, .art-item {
    color:#772469;
    margin:0;
    text-align:center;
    cursor:pointer;
    position:absolute;
    z-index:2;
    transition: transform 0.2s ease;
  }

  h1#makacs {
    top:40%;
    left:50%;
    transform:translate(-50%, -50%);
    font-size:10vw;
  }
  h1#makacs:hover {
    transform:translate(-50%, -50%) scale(1.2);
  }

  #menu {
    display:none;
    flex-direction: column;
    align-items:center;
    position:absolute;
    top:40%;
    left:50%;
    transform:translate(-50%, -50%);
  }
  .menu-item {
    font-size:3vw;
    margin:20px 0;
    text-transform: lowercase;
  }
  .menu-item:hover {
    transform: scale(1.2);
  }

  .art-item {
    font-size:2vw;
    text-transform: lowercase;
    animation: pulse 2s infinite ease-in-out;
  }
  .art-item.aggressive {
    animation: aggressivePulse 1s infinite ease-in-out;
  }

  @keyframes pulse { 0%{scale:1;} 50%{scale:1.1;} 100%{scale:1;} }
  @keyframes aggressivePulse {0%{scale:1;}50%{scale:1.4;}100%{scale:1;}}
  
  /* Art-oldal */
  .art-page {
    display:none;
    position:absolute;
    top:0; left:0;
    width:100%; height:100%;
    background-color:#c2c8f6;
    z-index:2;
    color:#772469;
    text-align:center;
    font-size:5vw;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction: column;
  }

  .art-page button {
    margin-top:20px;
    font-size:2vw;
    padding:10px 20px;
    cursor:pointer;
  }
</style>
</head>
<body>

<h1 id="makacs">Makacs</h1>

<div id="menu">
  <h1 class="menu-item" onclick="alert('About Me clicked!')">about me</h1>
  <h1 class="menu-item" id="my-art">my art</h1>
  <h1 class="menu-item" onclick="alert('Contact clicked!')">contact</h1>
</div>

<!-- Art-címek oldala -->
<div id="art-pages-container"></div>

<script>
  const makacs = document.getElementById('makacs');
  const menu = document.getElementById('menu');
  const artContainer = document.getElementById('art-pages-container');

  // Makacs → menü
  makacs.addEventListener('click', () => {
    makacs.style.display = 'none';
    menu.style.display = 'flex';
  });

  // My art → további art-címek
  document.getElementById('my-art').addEventListener('click', () => {
    const artItems = [
      'photos',
      'videos',
      'paintings',
      'makacs archive',
      'everythingelseyoushouldcareabout!'
    ];

    artItems.forEach(text => {
      const el = document.createElement('h1');
      el.className = 'art-item';
      el.innerText = text;
      el.style.fontSize = '2vw';
      el.style.left = Math.random() * (window.innerWidth - 200) + 'px';
      el.style.top = (text === 'everythingelseyoushouldcareabout!') ? '5%' : Math.random() * (window.innerHeight - 100) + 'px';
      artContainer.appendChild(el);

      // Klikk → saját art-oldal
      el.addEventListener('click', () => {
        showArtPage(text);
      });
    });
  });

  function showArtPage(title) {
    // új div art-oldal
    let page = document.createElement('div');
    page.className = 'art-page';
    page.innerHTML = `<div>${title}</div><button onclick="closeArtPage(this)">Vissza</button>`;
    document.body.appendChild(page);
    page.style.display = 'flex';
  }

  function closeArtPage(btn) {
    btn.parentElement.remove();
  }
</script>

<script>
  // p5.js canvas rajzoláshoz
  let isDrawing = false;
  function setup() {
    createCanvas(windowWidth, windowHeight);
    background('#c2c8f6');
    stroke('#b46b9f');
    strokeWeight(3);
  }
  function draw() {
    if (isDrawing && mouseIsPressed) line(mouseX, mouseY, pmouseX, pmouseY);
  }
  function mousePressed() { isDrawing = true; }
  function mouseReleased() { isDrawing = false; }
  function windowResized() { resizeCanvas(windowWidth, windowHeight); }
</script>

</body>
</html>
