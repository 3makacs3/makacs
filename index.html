<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>Makacs Portfólió Demo</title>
<script src="https://cdn.jsdelivr.net/npm/p5@1.9.0/lib/p5.js"></script>
<link href="https://fonts.cdnfonts.com/css/baskerville-etext" rel="stylesheet">
<style>
  body { margin:0; padding:0; height:100vh; background-color:#c2c8f6;
    font-family: 'Baskerville eText', Times, serif; overflow:hidden; }

  canvas { position:absolute; top:0; left:0; z-index:1; pointer-events:none; }

  h1#makacs, #menu, .art-container, .art-page { z-index:2; position:absolute;
    width:100%; text-align:center; color:#772469; margin:0;
    font-family: 'Baskerville eText', Times, serif; }

  h1#makacs { top:40%; font-size:10vw; cursor:pointer; transition: transform 0.2s ease; }
  h1#makacs:hover { transform: scale(1.2); }

  #menu { display:none; top:50%; transform: translateY(-50%); }
  .menu-item { font-size:3vw; margin:20px 0; text-transform: lowercase;
    cursor:pointer; transition: transform 0.2s ease; }
  .menu-item:hover { transform: scale(1.2); }

  .art-container { display:none; position:absolute; top:0; left:0; width:100%; height:100%;
    overflow-y:auto; background-color:#c2c8f6; padding-top:5%; box-sizing:border-box; }

  .art-item { margin: 30px auto; width: 200px; cursor:pointer; transition: transform 0.2s ease; }
  .art-item img, .art-item video { width:100%; display:block; }
  .art-item p { margin:5px 0 0 0; color:#772469; font-size:2vw; text-align:center; }

  /* Nagy nézet */
  .art-page { display:none; top:0; left:0; width:100%; height:100%; background-color:#c2c8f6;
    display:flex; justify-content:center; align-items:center; flex-direction: column; }
  .art-page img, .art-page video { max-width:80%; max-height:60%; cursor:pointer; transition: transform 0.2s ease; }
  .art-page p { color:#772469; font-size:2vw; margin-top:20px; text-align:center; max-width:80%; }
  .art-page button { margin-top:20px; font-size:2vw; padding:10px 20px; cursor:pointer; }
</style>
</head>
<body>

<h1 id="makacs">Makacs</h1>

<div id="menu">
  <h1 class="menu-item">about me</h1>
  <h1 class="menu-item" id="my-art">my art</h1>
  <h1 class="menu-item">contact</h1>
</div>

<div class="art-container" id="art-container">
  <!-- Előre definiált art-itemek placeholderrel -->
  <div class="art-item" data-title="Photo 1" data-desc="Ez egy fotó leírása.">
    <img src="placeholder.jpg" alt="Photo 1"><p>photo 1</p>
  </div>
  <div class="art-item" data-title="Video 1" data-desc="Ez egy videó leírása.">
    <video src="placeholder.mp4" muted loop></video><p>video 1</p>
  </div>
  <div class="art-item" data-title="Painting 1" data-desc="Ez egy festmény leírása.">
    <img src="placeholder.jpg" alt="Painting 1"><p>painting 1</p>
  </div>
  <div class="art-item" data-title="Makacs Archive" data-desc="Ez a Makacs Archívum leírása.">
    <img src="placeholder.jpg" alt="Makacs Archive"><p>makacs archive</p>
  </div>
  <div class="art-item aggressive" data-title="Everything Else" data-desc="Ez minden más leírása.">
    <img src="placeholder.jpg" alt="Everything Else"><p>everythingelseyoushouldcareabout!</p>
  </div>
</div>

<div class="art-page" id="art-page">
  <img id="large-media" src="" alt="">
  <video id="large-video" src="" controls style="display:none;"></video>
  <p id="large-desc"></p>
  <button onclick="closeArtPage()">Vissza</button>
</div>

<script>
  const makacs = document.getElementById('makacs');
  const menu = document.getElementById('menu');
  const artContainer = document.getElementById('art-container');
  const artPage = document.getElementById('art-page');
  const largeMedia = document.getElementById('large-media');
  const largeVideo = document.getElementById('large-video');
  const largeDesc = document.getElementById('large-desc');

  // Makacs felirat kattintás
  makacs.addEventListener('click', ()=>{ makacs.style.display='none'; menu.style.display='block'; });

  // My Art kattintás
  document.getElementById('my-art').addEventListener('click', ()=>{
    menu.style.display='none';
    artContainer.style.display='block';
  });

  // Nagy nézet megnyitása
  document.querySelectorAll('.art-item').forEach(item=>{
    item.addEventListener('click', ()=>{
      const isVideo = item.querySelector('video') !== null;
      if(isVideo){
        largeVideo.src = item.querySelector('video').src;
        largeVideo.style.display = 'block';
        largeMedia.style.display = 'none';
      } else {
        largeMedia.src = item.querySelector('img').src;
        largeMedia.style.display = 'block';
        largeVideo.style.display = 'none';
      }
      largeDesc.textContent = item.dataset.desc;
      artPage.style.display='flex';
      scaleState = 1;
    });
  });

  // Zoom kattintásra
  let scaleState = 1;
  largeMedia.addEventListener('click', ()=>{
    scaleState = scaleState===1 ? 1.5 : 1;
    largeMedia.style.transform = `scale(${scaleState})`;
  });
  largeVideo.addEventListener('click', ()=>{
    scaleState = scaleState===1 ? 1.5 : 1;
    largeVideo.style.transform = `scale(${scaleState})`;
  });

  function closeArtPage(){
    artPage.style.display='none';
    largeMedia.src=''; largeVideo.src='';
  }
</script>

<script>
  // p5.js canvas és pulzáló art-item animáció
  let isDrawing=false;
  let items = [];
  function setup(){
    createCanvas(windowWidth, windowHeight);
    background('#c2c8f6');
    stroke('#b46b9f');
    strokeWeight(3);

    // Pulzáló animációhoz eltároljuk az art-itemeket
    document.querySelectorAll('.art-item').forEach((el)=>{
      let scale = 1;
      let speed = el.classList.contains('aggressive') ? 0.08 : 0.03;
      items.push({el, scale, speed});
    });
  }

  function draw(){
    if(isDrawing && mouseIsPressed) line(mouseX, mouseY, pmouseX, pmouseY);

    // Pulzálás
    items.forEach(obj=>{
      obj.scale += obj.speed;
      if(obj.scale>1.1 || obj.scale<0.9) obj.speed *= -1;
      obj.el.style.transform = `scale(${obj.scale})`;
    });
  }

  function mousePressed(){ isDrawing=true; }
  function mouseReleased(){ isDrawing=false; }
  function windowResized(){ resizeCanvas(windowWidth, windowHeight); }
</script>

</body>
</html>
