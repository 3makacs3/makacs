<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>Makacs Portfólió Demo</title>
<script src="https://cdn.jsdelivr.net/npm/p5@1.9.0/lib/p5.js"></script>
<link href="https://fonts.cdnfonts.com/css/baskerville-etext" rel="stylesheet">
<style>
  body { margin:0; padding:0; background-color:#c2c8f6; font-family:'Baskerville eText',Times,serif; overflow:hidden; }
  canvas { position:absolute; top:0; left:0; z-index:1; pointer-events:none; }

  h1#makacs, #menu { z-index:2; position:absolute; width:100%; text-align:center; color:#772469; margin:0; }
  h1#makacs { top:40%; font-size:10vw; cursor:pointer; transition: transform 0.2s ease; }
  h1#makacs:hover { transform: scale(1.2); }
  #menu { display:none; top:50%; transform:translateY(-50%); }
  .menu-item { font-size:3vw; margin:20px 0; text-transform: lowercase; cursor:pointer; transition: transform 0.2s ease; }
  .menu-item:hover { transform: scale(1.2); }

  .collection { display:none; position:absolute; top:0; left:0; width:100%; height:100%; 
    overflow-y:auto; background-color:#c2c8f6; padding-top:5%; box-sizing:border-box; z-index:2; }
  .collection-item { margin: 30px auto; width: 200px; cursor:pointer; }
  .collection-item img, .collection-item video { width:100%; display:block; }
  .collection-item p { margin:5px 0 0 0; color:#772469; font-size:2vw; text-align:center; }

  .art-page { display:none; position:absolute; top:0; left:0; width:100%; height:100%; background-color:#c2c8f6; 
    display:flex; flex-direction:column; justify-content:center; align-items:center; z-index:2; }
  .art-page img, .art-page video { max-width:80%; max-height:60%; cursor:pointer; transition: transform 0.2s ease; }
  .art-page p { color:#772469; font-size:2vw; margin-top:20px; text-align:center; max-width:80%; }
  .art-page button { margin-top:20px; font-size:2vw; padding:10px 20px; cursor:pointer; }
</style>
</head>
<body>

<h1 id="makacs">Makacs</h1>

<div id="menu">
  <h1 class="menu-item">about me</h1>
  <h1 class="menu-item" id="my-art">my art</h1>
  <h1 class="menu-item">contact</h1>
</div>

<div class="collection" id="art-collection"></div>

<div class="art-page" id="art-page">
  <img id="large-media" src="" alt="">
  <video id="large-video" src="" controls style="display:none;"></video>
  <p id="large-desc"></p>
  <button onclick="closeArtPage()">Vissza</button>
</div>

<script>
const makacs = document.getElementById('makacs');
const menu = document.getElementById('menu');
const artCollection = document.getElementById('art-collection');
const artPage = document.getElementById('art-page');
const largeMedia = document.getElementById('large-media');
const largeVideo = document.getElementById('large-video');
const largeDesc = document.getElementById('large-desc');

makacs.addEventListener('click', ()=>{ makacs.style.display='none'; menu.style.display='block'; });
document.getElementById('my-art').addEventListener('click', ()=>{
  menu.style.display='none'; 
  showCollection();
});

function showCollection(){
  artCollection.innerHTML='';
  artCollection.style.display='block';
  artItems.forEach(item=>{
    const div = document.createElement('div');
    div.classList.add('collection-item');
    div.style.position='absolute';
    div.style.left = item.x+'px';
    div.style.top = item.y+'px';
    const elem = document.createElement(item.isVideo?'video':'img');
    elem.src = item.src;
    if(item.isVideo) elem.controls = true;
    div.appendChild(elem);
    const p = document.createElement('p');
    p.textContent = item.title;
    div.appendChild(p);
    artCollection.appendChild(div);

    // Pulzálás animáció
    item.dom = div;
    item.scale = 1;
    item.speed = item.aggressive ? 0.08 : 0.03;

    // Kattintás
    div.addEventListener('click', ()=>{
      if(item.isVideo){
        largeVideo.src=item.src; largeVideo.style.display='block';
        largeMedia.style.display='none';
      } else {
        largeMedia.src=item.src; largeMedia.style.display='block';
        largeVideo.style.display='none';
      }
      largeDesc.textContent=item.desc;
      artPage.style.display='flex';
    });
  });
}

function closeArtPage(){
  artPage.style.display='none';
  largeMedia.src=''; largeVideo.src='';
}
</script>

<script>
let artItems = [
  {title:"photo",src:"placeholder.jpg",desc:"Photo description",x:0,y:0,aggressive:false,isVideo:false},
  {title:"video",src:"placeholder.mp4",desc:"Video description",x:0,y:0,aggressive:false,isVideo:true},
  {title:"painting",src:"placeholder.jpg",desc:"Painting description",x:0,y:0,aggressive:false,isVideo:false},
  {title:"makacs archive",src:"placeholder.jpg",desc:"Archive description",x:0,y:0,aggressive:false,isVideo:false},
  {title:"everythingelseyoushouldcareabout!",src:"placeholder.jpg",desc:"Aggressive description",x:0,y:0,aggressive:true,isVideo:false}
];

let isDrawing=false;
function setup(){
  createCanvas(windowWidth, windowHeight);
  background('#c2c8f6');
  stroke('#b46b9f'); strokeWeight(3);

  // Random pozíció
  artItems.forEach(item=>{
    item.x = random(50,width-250);
    item.y = random(50,height-150);
  });
}

function draw(){
  if(isDrawing && mouseIsPressed) line(mouseX, mouseY, pmouseX, pmouseY);

  // Pulzálás
  artItems.forEach(item=>{
    if(item.dom){
      item.scale += item.speed;
      if(item.scale>1.1 || item.scale<0.9) item.speed*=-1;
      item.dom.style.transform = `scale(${item.scale})`;
    }
  });
}

function mousePressed(){ isDrawing=true; }
function mouseReleased(){ isDrawing=false; }
function windowResized(){ resizeCanvas(windowWidth, windowHeight); }
</script>

</body>
</html>
